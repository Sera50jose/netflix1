            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background-color: rgba(0, 0, 0, 0.75); 
            padding: 60px 68px;
            width: 400px;
            color: white;
            border-radius: 4px;
        }

        
        h1 {
            margin-top: 0;
            font-size: 32px;
        }

        input {
            width: 100%;
            padding: 16px;
            margin-bottom: 16px;
            border-radius: 4px;
            border: none;
            background-color: #333;
            color: white;
            box-sizing: border-box; 
        }
        
        input::placeholder {
            color: #8c8c8c;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #e50914;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
        }
        
        button:hover {
            background-color: #c11119;
        }

      
        .row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #b3b3b3;
            margin-top: 12px;
            align-items: center;
        }


        .fb-icon {
            display: flex;
            align-items: center;
            margin-top: 15px;
            color: #737373;
            font-size: 14px;
        }
        
        .fb-icon span {
            background-color: #3b5998;
            color: white;
            padding: 0 6px;
            margin-right: 8px;
            font-weight: bold;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>Sign In</h1>

        <input type="text" placeholder="Email or phone number">
        <input type="password" placeholder="Password">

        <button>Sign In</button>

       \
        <div class="row">
            <label>
                <input type="checkbox"> Remember me
            </label>
            <a href="#" style="color:#b3b3b3; text-decoration:none;">Need help?</a>
        </div>

       
       
        
</body>
</html>
